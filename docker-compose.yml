services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rtt_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: rtt_center
      DB_USERNAME: rtt_user
      DB_PASSWORD: secret
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    depends_on:
      - postgres

  nginx:
    image: nginx:1.27-alpine
    container_name: rtt_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  postgres:
    image: postgres:17-alpine
    container_name: rtt_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rtt_center
      POSTGRES_USER: rtt_user
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
